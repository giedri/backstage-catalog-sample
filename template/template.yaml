apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: sam-api-service
  title: SAM API Service
  description: >
    Python microservice using AWS SAM with API Gateway (HTTP API v2),
    Lambda, and DynamoDB. Scaffolds a working CRUD service with unit tests,
    OpenAPI spec, DynamoDB access pattern docs, deployment config, and
    Claude Code configuration with drift detection from claude-hub fragments.
  tags:
    - python
    - serverless
    - sam
    - lambda
    - dynamodb
    - recommended
spec:
  owner: team-backend
  type: service

  parameters:
    - title: Service Information
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Service Name
          type: string
          description: >
            Unique name for the service. Used as the CloudFormation stack name,
            GitHub repo name, and Backstage component name.
            Must be lowercase with hyphens only (e.g., order-service, inventory-api).
          pattern: "^[a-z][a-z0-9-]*$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Brief description of what this service does.
        owner:
          title: Owner
          type: string
          description: Team that owns this service.
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

    - title: AWS Configuration
      required:
        - region
      properties:
        region:
          title: AWS Region
          type: string
          default: us-east-1
          enum:
            - us-east-1
            - us-west-2
            - eu-west-1
            - eu-central-1

    - title: Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    # Scaffold project from the skeleton directory.
    # Nunjucks renders all ${{ values.* }} placeholders.
    # The skeleton includes .claude/ with fragment marker, settings, and skills.
    # On first Claude Code session, the sync plugin detects the .fragment marker
    # and checks for updates from claude-hub. If the fragment has been updated
    # since this template was last synced, drift detection notifies the developer
    # to run /hub-fragment-update.
    - id: fetch-skeleton
      name: Scaffold project from template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          region: ${{ parameters.region }}

    # Publish to GitHub
    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts:
          - github.com
        repoUrl: ${{ parameters.repoUrl }}
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: internal
        topics:
          - python
          - serverless
          - sam

    # Register the component in the Backstage catalog
    - id: register
      name: Register in Backstage catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Backstage Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      - title: CloudFormation Console
        icon: cloud
        url: https://${{ parameters.region }}.console.aws.amazon.com/cloudformation/home?region=${{ parameters.region }}#/stacks?filteringText=${{ parameters.name }}
