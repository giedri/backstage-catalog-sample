openapi: 3.0.3
info:
  title: ${{ values.name }} API
  description: ${{ values.description }}
  version: 1.0.0
  contact:
    name: ${{ values.owner }}
    url: https://backstage.internal.acme.com/catalog/default/component/${{ values.name }}

servers:
  - url: "https://{apiId}.execute-api.{region}.amazonaws.com"
    variables:
      apiId:
        default: placeholder
      region:
        default: ${{ values.region }}

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: ${{ values.name }}

  /v1/items:
    post:
      summary: Create a new item
      operationId: createItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      summary: List items by owner
      operationId: listItems
      parameters:
        - name: owner_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: next_token
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemList"
        "400":
          description: Missing owner_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/items/{itemId}:
    get:
      summary: Get an item by ID
      operationId: getItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Item found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete an item
      operationId: deleteItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Item deleted
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    CreateItemRequest:
      type: object
      required:
        - name
        - owner_id
      properties:
        name:
          type: string
        description:
          type: string
        owner_id:
          type: string

    Item:
      type: object
      properties:
        item_id:
          type: string
        name:
          type: string
        description:
          type: string
        owner_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ItemList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        next_token:
          type: string
          nullable: true

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
