apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: order-service
  description: Order management microservice handling CRUD operations for customer orders.
  annotations:
    github.com/project-slug: acme-org/order-service
    backstage.io/techdocs-ref: dir:.
    aws.amazon.com/region: us-east-1
    pagerduty.com/service-id: P1234567
  tags:
    - python
    - serverless
    - sam
    - lambda
    - dynamodb
  links:
    - url: https://us-east-1.console.aws.amazon.com/cloudformation/home?region=us-east-1#/stacks?filteringText=order-service
      title: CloudFormation Stack
      icon: cloud
    - url: https://us-east-1.console.aws.amazon.com/cloudwatch/home?region=us-east-1#logsV2:log-groups$3FlogGroupNameFilter$3D/aws/lambda/order-service
      title: CloudWatch Logs
      icon: dashboard
spec:
  type: service
  lifecycle: production
  owner: team-backend
  system: order-management
  providesApis:
    - order-api
  dependsOn:
    - resource:order-table
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: order-api
  description: REST API for managing customer orders.
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: team-backend
  system: order-management
  definition:
    $text: ./docs/openapi.yaml
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: order-table
  description: DynamoDB table storing order data with single-table design.
  tags:
    - dynamodb
    - aws
spec:
  type: database
  owner: team-backend
  system: order-management
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: order-management
  description: Order management domain including APIs, processing, and storage.
spec:
  owner: team-backend
